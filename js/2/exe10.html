<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dia da semana - ex 10</title>
</head>
<body>
    <div>
        <label for="inum">Dia da semana</label>
        <input type="number" id="inum">
        <button type="submit" onclick="dia()">Verificar</button>
    </div>
    <script>
        function dia() {
            var dia = parseInt(document.getElementById('inum').value)

            switch(dia) {
                case 1: window.alert('Domingo'); break
                case 2: window.alert('Segunda'); break
                case 3: window.alert('Terca'); break
                case 4: window.alert('Quarta'); break
                case 5: window.alert('Quinta'); break
                case 6: window.alert('Sexta'); break
                case 7: window.alert('Sabado'); break
                default: window.alert('Invalido')
            }
        }
    </script>
</body>
</html>
