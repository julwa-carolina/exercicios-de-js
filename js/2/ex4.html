<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negativo ou Positivo</title>
</head>
<body>
    <label for="inum">Digite um numero</label>
    <input type="number" name="num" id="inum">
    <button type="submit" onclick="negativoOUpositivo()">Verificar</button>
    <script>
        function negativoOUpositivo() {
            var num = parseFloat(document.getElementById('inum').value)
            if (num < 0) {
                window.alert('Negativo!!')
            } else {
                window.alert('Positivo!!')
            }
        }
    </script>
</body>
</html>
