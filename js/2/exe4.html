<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar</title>
</head>
<body>
    <label for="inum1">Numero 1</label>
    <input type="number" id="inum1">

    <label for="inum2">Numero 2</label>
    <input type="number" id="inum2">
    <button type="submit" onclick="trocar()">Trocas</button>

    <script>
        function trocar() {
            var num1 = parseInt(document.getElementById('inum1').value)
            var num2 = parseInt(document.getElementById('inum2').value)

            window.alert(`Os numeros agora: ${num1}, ${num2}`)
            var copia = num1
            num1 = num2
            num2 = copia
            window.alert(`Trocou: ${num1}, ${num2}`)
        }
        


    </script>
</body>
</html>
