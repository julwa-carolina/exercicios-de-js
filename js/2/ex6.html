<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="inum">Escolha um numero de 1 a 12</label>
    <input type="number" id="inum">
    <button type="submit" onclick="mes()">Verificar</button>

    <script>
        function mes() {
            var num = parseInt(document.getElementById('inum').value)
            if (num > 12) {
                window.alert('Escolha um numero valido!!')
            } else {
                switch(num) {
                    case 1: window.alert('janeiro'); break
                    case 2: window.alert('fevereiro'); break
                    case 3: window.alert('marco'); break
                    case 4: window.alert('abril'); break
                    case 5: window.alert('maio'); break
                    case 6: window.alert('junho'); break
                    case 7: window.alert('julho'); break
                    case 8: window.alert('agosto'); break
                    case 9: window.alert('setembro'); break
                    case 10: window.alert('outubro'); break
                    case 11: window.alert('novembro'); break
                    case 12: window.alert('dezembro');
                    default: window.alert('Escolha um numero valido!!')
                }

            }
        }
    </script>
</body>
</html>
