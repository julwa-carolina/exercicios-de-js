<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex 5</title>
</head>
<body>
    <div>
        <label for="inum1">Numero 1</label>
        <input type="number" id="inum1">

        <label for="inum2">Numero 2</label>
        <input type="number" id="inum2">

        <label for="inum3">Numero 3</label>
        <input type="number" id="inum3">

        <button type="submit" onclick="maEme()">Verificar o maior</button>
    </div>

    <script>
        function maEme() {
            var num1 = parseInt(document.getElementById('inum1').value)
            var num2 = parseInt(document.getElementById('inum2').value)
            var num3 = parseInt(document.getElementById('inum3').value)

            var ma = num1
            var me = num3


            if (num2 > num3 && num2 > num1) {
                ma = num2
            } else if (num3 > num1 && num3 > num2) {
                ma = num3
            }

            if (num1 < num3 && num1 < num2) {
                me = num1
            } else if (num2 < num1 && num2 < num3) {
                me = num2
            } 

            window.alert(`maior: ${ma}, menor: ${me}`)
        }
    </script>
</body>
</html>
